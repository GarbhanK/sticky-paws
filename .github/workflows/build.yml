name: Build Sticky Paws

on:
  push:
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential clang libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev pkg-config
          # If raylib is not vendored, uncomment:
          # sudo apt install -y libraylib-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install raylib

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw
          # Assume raylib static libs are in lib/, otherwise you'd need to build/install raylib

      - name: Build on macOS
        if: runner.os == 'macOS'
        run: make build_osx

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: make build_linux

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: make build_windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sticky_paws-${{ matrix.os }}
          path: bin/*
