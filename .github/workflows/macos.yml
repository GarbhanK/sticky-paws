name: macOS

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - ".github/workflows/macos.yml"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # for actions/upload-release-asset to upload release asset
    runs-on: macos-latest

    env:
      PROJECT_NAME: ${{ github.event.repository.name }}
      PROJECT_BUILD_PATH: ${{ github.event.repository.name }}/src
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_macos
      PROJECT_CUSTOM_FLAGS: ""
      PROJECT_RESOURCES_PATH: assets

    steps:
      - name: Checkout this repo
        uses: actions/checkout@master
        with:
          path: ${{ env.PROJECT_NAME }}

      - name: Checkout raylib repo
        uses: actions/checkout@v4
        with:
          repository: raysan5/raylib
          path: raylib

      - name: Setup Release Paths
        run: |
          echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_macos" >> $GITHUB_ENV
        shell: bash
        if: github.event_name == 'release' && github.event.action == 'published'

      - name: Setup Environment
        run: |
          mkdir ${{ env.PROJECT_RELEASE_PATH }}
          cd ${{ env.PROJECT_RELEASE_PATH }}
          mkdir ${{ env.PROJECT_NAME }}.app
          cd ${{ env.PROJECT_NAME }}.app
          mkdir Contents
          cd Contents
          mkdir MacOS
          mkdir Resources
          cd ../../..
          ls
        shell: bash

      - name: Build Game
        run: |
          cd ${{ env.PROJECT_NAME }}

          # Build x86_64
          cmake -B build_x86_64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build_x86_64 --config Release
          mv -v -f build_x86_64/${{ env.PROJECT_NAME }}/sticky-paws sticky-paws_x86_64

          # Build arm64
          cmake -B build_arm64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build_arm64 --config Release
          mv -v -f build_arm64/${{ env.PROJECT_NAME }}/sticky-paws sticky-paws_arm64

          # Combine into universal binary
          lipo -create -output sticky-paws sticky-paws_x86_64 sticky-paws_arm64
          lipo -detailed_info sticky-paws

      - name: Generate Artifacts
        run: |
          # Variables
          APP_BUNDLE="${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_RESOURCES="$APP_CONTENTS/Resources"
          APP_BUILD_BINARY="sticky-paws/sticky-paws"
          ICON_FILE="sticky-paws/src//${{ env.PROJECT_NAME }}.icns"
          INFO_PLIST="sticky-paws/src/Info.plist"

          # Copy universal binary
          cp "$APP_BUILD_BINARY" "$APP_MACOS"

          # Copy icon if it exists
          if [ -f "$ICON_FILE" ]; then
            cp "$ICON_FILE" "$APP_RESOURCES"
          else
            echo "Warning: Icon file not found, skipping..."
          fi

          # Copy Info.plist
          if [ -f "$INFO_PLIST" ]; then
            cp "$INFO_PLIST" "$APP_CONTENTS"
          else
            echo "Warning: Info.plist not found, skipping..."
          fi

          # Copy resources
          cp -r sticky-paws/src/assets "$APP_RESOURCES"

          # Copy README and LICENSE
          cp sticky-paws/README.md "$APP_BUNDLE/../"
          cp sticky-paws/LICENSE "$APP_BUNDLE/../"

          # Zip the app bundle
          7z a "${{ env.PROJECT_RELEASE_PATH }}" "${{ env.PROJECT_RELEASE_PATH }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_RELEASE_PATH }}
          path: ./${{ env.PROJECT_RELEASE_PATH }}

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PROJECT_RELEASE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'release' && github.event.action == 'published'
