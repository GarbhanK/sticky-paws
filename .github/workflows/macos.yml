      #     make clean

      #     # Join x86_64 and arm64 binaries
      #     lipo -create -output ${{ env.PROJECT_NAME }} ${{ env.PROJECT_NAME }}_x86_64 ${{ env.PROJECT_NAME }}_arm64
      #     lipo ${{ env.PROJECT_NAME }} -detailed_info
      #     cd ..

      - name: Build Game
        run: |
          cd ${{ env.PROJECT_NAME }}

          # Build x86_64
          cmake -B build_x86_64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build_x86_64 --config Release
          mv -v -f build_x86_64/${{ env.PROJECT_NAME }}/sticky-paws sticky-paws_x86_64

          # Build arm64
          cmake -B build_arm64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build_arm64 --config Release
          mv -v -f build_arm64/${{ env.PROJECT_NAME }}/sticky-paws sticky-paws_arm64

          # Combine into universal binary
          lipo -create -output sticky-paws sticky-paws_x86_64 sticky-paws_arm64
          lipo -detailed_info sticky-paws

      # - name: Generate Artifacts
      #   run: |
      #     ls ${{ env.PROJECT_BUILD_PATH }}

      #     # copy universal binary into .app bundle
      #     cp sticky-paws/sticky-paws ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents/MacOS

      #     # copy icon
      #     cp ${{ env.PROJECT_NAME }}/src/${{ env.PROJECT_NAME }}.icns ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents/Resources

      #     # copy Info.plit
      #     cp ${{ env.PROJECT_NAME }}/src/Info.plist ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents

      #     # copy resources
      #     cp -r ${{ env.PROJECT_NAME }}/${{ env.PROJECT_RESOURCES_PATH }} ${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app/Contents

      #     # copy README and LICENSE
      #     cp ${{ env.PROJECT_NAME }}/README.md ${{ env.PROJECT_RELEASE_PATH }}
      #     cp ${{ env.PROJECT_NAME }}/LICENSE ${{ env.PROJECT_RELEASE_PATH }}
      #     ls ${{ env.PROJECT_RELEASE_PATH }}

      #     # Zip the app bundle
      #     7z a ./${{ env.PROJECT_RELEASE_PATH }}.zip ./${{ env.PROJECT_RELEASE_PATH }}

      - name: Generate Artifacts
        run: |
          # Variables
          APP_BUNDLE="${{ env.PROJECT_RELEASE_PATH }}/${{ env.PROJECT_NAME }}.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_RESOURCES="$APP_CONTENTS/Resources"
          APP_BUILD_BINARY="sticky-paws/sticky-paws"
          ICON_FILE="sticky-paws/src/assets/${{ env.PROJECT_NAME }}.icns"
          INFO_PLIST="sticky-paws/src/Info.plist"

          # Copy universal binary
          cp "$APP_BUILD_BINARY" "$APP_MACOS"

          # Copy icon if it exists
          if [ -f "$ICON_FILE" ]; then
            cp "$ICON_FILE" "$APP_RESOURCES"
          else
            echo "Warning: Icon file not found, skipping..."
          fi

          # Copy Info.plist
          if [ -f "$INFO_PLIST" ]; then
            cp "$INFO_PLIST" "$APP_CONTENTS"
          else
            echo "Warning: Info.plist not found, skipping..."
          fi

          # Copy resources
          cp -r sticky-paws/src/assets "$APP_CONTENTS"

          # Copy README and LICENSE
          cp sticky-paws/README.md "$APP_BUNDLE/../"
          cp sticky-paws/LICENSE "$APP_BUNDLE/../"

          # Zip the app bundle
          7z a "${{ env.PROJECT_RELEASE_PATH }}.zip" "${{ env.PROJECT_RELEASE_PATH }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_RELEASE_PATH }}.zip
          path: ./${{ env.PROJECT_RELEASE_PATH }}.zip

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PROJECT_RELEASE_PATH }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'release' && github.event.action == 'published'
